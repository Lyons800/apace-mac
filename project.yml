name: Apace

options:
  bundleIdPrefix: so.apace
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  ApaceKit:
    path: .
  DynamicNotchKit:
    url: https://github.com/MrKai77/DynamicNotchKit
    exactVersion: 1.1.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Apace:
    type: application
    platform: macOS
    sources:
      - App
    dependencies:
      - package: ApaceKit
        product: Features
      - package: ApaceKit
        product: Adapters
      - package: ApaceKit
        product: ApaceKit
      - package: ApaceKit
        product: DesignSystem
      - package: DynamicNotchKit
      - package: Sparkle
    settings:
      base:
        PRODUCT_NAME: Apace
        PRODUCT_BUNDLE_IDENTIFIER: so.apace
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Sparkle EdDSA public key for verifying updates. Generate with Sparkle's
        # `generate_keys`; paste the public key here (the private key stays out of git).
        SPARKLE_PUBLIC_ED_KEY: "zOO/VOlBiXDHXRsNb9W3LcMRFq3ZO8UCcZEoWbGLzFg="
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Apace.entitlements
        SWIFT_VERSION: "6.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
